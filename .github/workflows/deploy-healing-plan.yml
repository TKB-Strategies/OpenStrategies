name: Deploy Healing Plan

on:
  push:
    branches:
      - main
    paths:
      - 'apps/healing-plan/**'
      - '.github/workflows/deploy-healing-plan.yml'
  workflow_dispatch:

concurrency:
  group: healing-plan-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/healing-plan/package-lock.json

      - name: Install dependencies
        working-directory: apps/healing-plan
        run: npm ci

      - name: Build production assets
        working-directory: apps/healing-plan
        run: npm run build

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.NC_SSH_PRIVATE_KEY }}

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.NC_PORT }}" "${{ secrets.NC_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure target directory exists
        run: |
          ssh -p "${{ secrets.NC_PORT }}" "${{ secrets.NC_USER }}@${{ secrets.NC_HOST }}" \
            "mkdir -p '${{ secrets.NC_TARGET_DIR }}'"

      - name: Deploy dist/ to Namecheap
        run: |
          rsync -az --delete \
            -e "ssh -p ${{ secrets.NC_PORT }}" \
            apps/healing-plan/dist/ \
            "${{ secrets.NC_USER }}@${{ secrets.NC_HOST }}:${{ secrets.NC_TARGET_DIR }}/"

      - name: Smoke test
        run: |
          sleep 5
          curl -sI https://tkbstrategies.com/healing-plan/ | head -5
